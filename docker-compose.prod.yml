# Production-ready docker-compose.yml for Appwrite
# WARNING: This is for production use only. Do NOT expose debug ports or development volumes.
# Never commit sensitive credentials to git. Use .env file with proper permissions (600)

version: '3.9'

x-logging: &x-logging
  logging:
    driver: "json-file"
    options:
      max-file: "5"
      max-size: "10m"

services:
  traefik:
    image: traefik:2.11
    <<: *x-logging
    container_name: appwrite-traefik
    restart: always
    command:
      - --log.level=INFO
      - --api.dashboard=false
      - --api.insecure=false
      - --providers.file.directory=/storage/config
      - --providers.file.watch=true
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --providers.docker.constraints=Label(`traefik.constraint-label-stack`,`appwrite`)
      - --entrypoints.appwrite_web.address=:80
      - --entrypoints.appwrite_websecure.address=:443
      - --accesslog=true
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}
      - --certificatesresolvers.letsencrypt.acme.storage=/storage/certificates/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=appwrite_web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - appwrite-config:/storage/config:ro
      - appwrite-certificates:/storage/certificates:rw
    depends_on:
      - appwrite
    networks:
      - appwrite
    labels:
      - "com.example.description=Traefik Reverse Proxy"

  appwrite:
    container_name: appwrite
    <<: *x-logging
    image: ${DOCKER_HUB_USERNAME:-appwrite}/appwrite:${IMAGE_TAG:-latest}
    restart: always
    networks:
      - appwrite
    dns:
      - 1.1.1.1
      - 8.8.8.8
    labels:
      - "traefik.enable=true"
      - "traefik.constraint-label-stack=appwrite"
      - "traefik.docker.network=appwrite"
      - "traefik.http.services.appwrite_api.loadbalancer.server.port=80"
      - traefik.http.routers.appwrite_api_http.entrypoints=appwrite_web
      - traefik.http.routers.appwrite_api_http.rule=PathPrefix(`/`)
      - traefik.http.routers.appwrite_api_http.service=appwrite_api
      - traefik.http.routers.appwrite_api_http.middlewares=appwrite_https_redirect
      - traefik.http.middlewares.appwrite_https_redirect.redirectscheme.scheme=https
      - traefik.http.routers.appwrite_api_https.entrypoints=appwrite_websecure
      - traefik.http.routers.appwrite_api_https.rule=PathPrefix(`/`)
      - traefik.http.routers.appwrite_api_https.service=appwrite_api
      - traefik.http.routers.appwrite_api_https.tls=true
      - traefik.http.routers.appwrite_api_https.tls.certresolver=letsencrypt
    volumes:
      - appwrite-uploads:/storage/uploads:rw
      - appwrite-imports:/storage/imports:rw
      - appwrite-cache:/storage/cache:rw
      - appwrite-config:/storage/config:rw
      - appwrite-certificates:/storage/certificates:rw
      - appwrite-functions:/storage/functions:rw
      - appwrite-sites:/storage/sites:rw
      - appwrite-builds:/storage/builds:rw
    depends_on:
      - mariadb
      - redis
    environment:
      - _APP_ENV=production
      - _APP_VERSION=${APP_VERSION:-latest}
      - _APP_EDITION=${APP_EDITION:-community}
      - _APP_DOMAIN=${APP_DOMAIN:-localhost}
      - _APP_CONSOLE_DOMAIN=${CONSOLE_DOMAIN:-console.localhost}
      - _APP_OPENSSL_KEY_V1=${OPENSSL_KEY_V1}
      - _APP_DB_HOST=mariadb
      - _APP_DB_PORT=3306
      - _APP_DB_SCHEMA=${DB_SCHEMA:-appwrite}
      - _APP_DB_USER=${DB_USER:-appwrite}
      - _APP_DB_PASS=${DB_PASS}
      - _APP_REDIS_HOST=redis
      - _APP_REDIS_PORT=6379
      - _APP_SMTP_HOST=${SMTP_HOST}
      - _APP_SMTP_PORT=${SMTP_PORT:-587}
      - _APP_SMTP_SECURE=${SMTP_SECURE:-tls}
      - _APP_SMTP_USERNAME=${SMTP_USERNAME}
      - _APP_SMTP_PASSWORD=${SMTP_PASSWORD}
      - _APP_SYSTEM_EMAIL_NAME=${SYSTEM_EMAIL_NAME:-Appwrite}
      - _APP_SYSTEM_EMAIL_ADDRESS=${SYSTEM_EMAIL_ADDRESS:-noreply@appwrite.io}
      - _APP_STORAGE_DEVICE=${STORAGE_DEVICE:-local}
      - _APP_STORAGE_S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - _APP_STORAGE_S3_SECRET=${S3_SECRET}
      - _APP_STORAGE_S3_REGION=${S3_REGION:-us-east-1}
      - _APP_STORAGE_S3_BUCKET=${S3_BUCKET}
      - _APP_STORAGE_S3_ENDPOINT=${S3_ENDPOINT}
      - _APP_OPTIONS_ABUSE=enabled
      - _APP_OPTIONS_ROUTER_PROTECTION=enabled
      - _APP_OPTIONS_FORCE_HTTPS=disabled
      - _APP_USAGE_STATS=enabled
      - _APP_LOGGING_CONFIG=${LOGGING_CONFIG}
      - _APP_EXECUTOR_SECRET=${EXECUTOR_SECRET}
      - _APP_EXECUTOR_HOST=openruntimes-executor
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  appwrite-console:
    <<: *x-logging
    container_name: appwrite-console
    image: appwrite/console:${CONSOLE_VERSION:-latest}
    restart: always
    networks:
      - appwrite
    labels:
      - "traefik.enable=true"
      - "traefik.constraint-label-stack=appwrite"
      - "traefik.docker.network=appwrite"
      - "traefik.http.services.appwrite_console.loadbalancer.server.port=80"
      - traefik.http.routers.appwrite_console_http.entrypoints=appwrite_web
      - traefik.http.routers.appwrite_console_http.rule=PathPrefix(`/console`)
      - traefik.http.routers.appwrite_console_http.service=appwrite_console
      - traefik.http.routers.appwrite_console_https.entrypoints=appwrite_websecure
      - traefik.http.routers.appwrite_console_https.rule=PathPrefix(`/console`)
      - traefik.http.routers.appwrite_console_https.service=appwrite_console
      - traefik.http.routers.appwrite_console_https.tls=true

  mariadb:
    image: mariadb:10.11
    container_name: appwrite-mariadb
    <<: *x-logging
    restart: always
    networks:
      - appwrite
    volumes:
      - appwrite-mariadb:/var/lib/mysql:rw
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASS}
      - MYSQL_DATABASE=${DB_SCHEMA:-appwrite}
      - MYSQL_USER=${DB_USER:-appwrite}
      - MYSQL_PASSWORD=${DB_PASS}
      - MARIADB_AUTO_UPGRADE=1
    command: "mysqld --innodb-flush-method=fsync --max-connections=1024 --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2.4-alpine
    <<: *x-logging
    container_name: appwrite-redis
    restart: always
    command: >
      redis-server
      --maxmemory            2gb
      --maxmemory-policy     allkeys-lru
      --maxmemory-samples    5
      --appendonly           yes
      --appendfsync          everysec
    networks:
      - appwrite
    volumes:
      - appwrite-redis:/data:rw
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  openruntimes-executor:
    container_name: openruntimes-executor
    hostname: exc1
    <<: *x-logging
    stop_signal: SIGINT
    image: openruntimes/executor:${EXECUTOR_VERSION:-latest}
    restart: always
    networks:
      - appwrite
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - appwrite-builds:/storage/builds:rw
      - appwrite-functions:/storage/functions:rw
      - appwrite-sites:/storage/sites:rw
    environment:
      - OPR_EXECUTOR_IMAGE_PULL=enabled
      - OPR_EXECUTOR_INACTIVE_TRESHOLD=600
      - OPR_EXECUTOR_MAINTENANCE_INTERVAL=300000
      - OPR_EXECUTOR_ENV=production
      - OPR_EXECUTOR_SECRET=${EXECUTOR_SECRET}
      - OPR_EXECUTOR_RUNTIME_VERSIONS=v5
      - OPR_EXECUTOR_DOCKER_HUB_USERNAME=${DOCKER_HUB_USERNAME}
      - OPR_EXECUTOR_DOCKER_HUB_PASSWORD=${DOCKER_HUB_PASSWORD}

  openruntimes-proxy:
    container_name: openruntimes-proxy
    hostname: proxy
    <<: *x-logging
    stop_signal: SIGINT
    image: openruntimes/proxy:${PROXY_VERSION:-latest}
    restart: always
    networks:
      - appwrite
    environment:
      - OPR_PROXY_ENV=production
      - OPR_PROXY_EXECUTOR_SECRET=${EXECUTOR_SECRET}
      - OPR_PROXY_SECRET=${EXECUTOR_SECRET}
      - OPR_PROXY_ALGORITHM=random
      - OPR_PROXY_EXECUTORS=exc1
      - OPR_PROXY_HEALTHCHECK_INTERVAL=10000
      - OPR_PROXY_MAX_TIMEOUT=600
      - OPR_PROXY_HEALTHCHECK=enabled

networks:
  appwrite:
    name: appwrite
    driver: bridge

volumes:
  appwrite-mariadb:
    driver: local
  appwrite-redis:
    driver: local
  appwrite-cache:
    driver: local
  appwrite-uploads:
    driver: local
  appwrite-imports:
    driver: local
  appwrite-certificates:
    driver: local
  appwrite-functions:
    driver: local
  appwrite-sites:
    driver: local
  appwrite-builds:
    driver: local
  appwrite-config:
    driver: local
