name: Build and Test

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_HUB_USERNAME }}/appwrite

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          tags: test:latest
          outputs: type=docker,dest=/tmp/image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.sha }}
            DEBUG=false
            TESTING=false

      - name: Load Docker image
        run: |
          docker load --input /tmp/image.tar
          docker tag test:latest appwrite-test:latest

      - name: Run security scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: appwrite-test:latest
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Run PHPUnit tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/tests:/usr/src/code/tests \
            -v ${{ github.workspace }}/app:/usr/src/code/app \
            -v ${{ github.workspace }}/src:/usr/src/code/src \
            appwrite-test:latest \
            php /usr/src/code/app/http.php

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: curl, imagick, mbstring, json, yaml, dom, redis, swoole, pdo, openssl, zlib, sockets
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction

      - name: Run linting
        run: composer lint

      - name: Run static analysis
        run: composer check
